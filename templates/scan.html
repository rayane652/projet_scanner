{% extends "base.html" %}

{% block content %}

<div style="margin-left:20px; margin-top:20px;">

    <form action="/run_scan" method="POST">

        <input type="text" name="target" placeholder="IP, domain, or URL" required
               style="padding:8px; width:250px;">

        <select name="type" style="padding:8px;">
            <option value="port">Port Scan</option>
            <option value="web">Web Scan</option>
            <option value="cve">CVE Search</option>
        </select>

        <button type="submit" style="padding:8px 15px;">
            Start Scan
        </button>

    </form>

</div>

{% endblock %}
