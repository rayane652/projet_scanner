{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/scan.css') }}">

<div class="scan-layout">

  <div class="scan-main">

    <section class="scan-hero">
      <div class="hero-text">
        <span class="badge">NEW SCAN</span>
        <h1>Start a New Scan</h1>
        <p>Let Vulnix discover vulnerabilities before attackers do.</p>
      </div>
      <div class="hero-graphic">
        <div class="radar"><div class="ring"></div><div class="ring delay1"></div><div class="ring delay2"></div><div class="scan-line"></div></div>
      </div>
    </section>

    <section class="scan-card">
      <form class="scan-form" action="/run_scan" method="POST">
        <input type="hidden" name="scan_mode" id="scan-mode-hidden" value="unauthenticated">

        <div class="scan-form-grid">
          <!-- Row: Name + Target -->
          <label class="field">
            <span>Machine Name</span>
            <div class="input-box"><input type="text" name="machine_name" placeholder="e.g. Production API, Kali VM"></div>
          </label>

          <label class="field">
            <span>Target <i class="fas fa-info-circle"></i></span>
            <div class="input-box"><input type="text" name="target" id="target-input" placeholder="IP, Domain or URL" required></div>
            <small id="target-helper" style="color:#94a3b8;font-size:11px;margin-top:4px;display:block">e.g. 192.168.1.10 or scanme.nmap.org</small>
          </label>

          <!-- Scan Type + Scope -->
          <label class="field full-row">
            <span>Scan Type</span>
            <div class="input-box">
              <i class="fas fa-shield-alt left-icon"></i>
              <select name="type" id="scan-type">
                <option value="security">Security Scan</option>
                <option value="web">Web Scan</option>
              </select>
            </div>
          </label>

          <label class="field full-row" id="scope-row">
            <span>Scan Scope</span>
            <div class="scope-selector">
              <label class="scope-pill"><input type="radio" name="scan_scope" value="host" checked><span><i class="fas fa-desktop"></i> Host Scan</span></label>
              <label class="scope-pill"><input type="radio" name="scan_scope" value="network"><span><i class="fas fa-network-wired"></i> Network Scan</span></label>
            </div>
          </label>

          <!-- Hidden profile — always adaptive -->
          <input type="hidden" name="profile" value="adaptive">

          <!-- Engine (security only) -->
          <div id="sec-engine" class="section-card full-row">
            <div class="section-title"><i class="fas fa-network-wired"></i> Scan Engine</div>
            <div class="engine-row">
              <div class="tcp-group">
                <span class="section-label">TCP Method</span>
                <div class="pill-group">
                  <label class="pill"><input type="radio" name="tcp_scan_method" value="connect" checked><span>TCP Connect</span></label>
                  <label class="pill"><input type="radio" name="tcp_scan_method" value="syn"><span>SYN Scan</span></label>
                </div>
              </div>
              <label class="udp-toggle-wrap">
                <span class="section-label">UDP Scan</span>
                <label class="switch-pill">
                  <input type="checkbox" name="include_udp" value="1" id="udp-checkbox">
                  <span class="switch-track"><span class="switch-knob"></span></span>
                </label>
              </label>
              <div class="fp-box">
                <i class="fas fa-fingerprint"></i>
                <div><b>Fingerprinting</b><span>Service banners, version, OS</span></div>
              </div>
            </div>
          </div>

          <!-- Credentials (security only) -->
          <div id="sec-creds" class="section-card full-row">
            <div class="section-title-bar">
              <div class="section-title"><i class="fas fa-lock"></i> Authenticated Credentials (Optional)</div>
              <label class="switch">
                <input type="checkbox" id="auth-toggle">
                <span class="slider"></span>
              </label>
            </div>
            <div class="cred-grid" id="cred-fields-inner">
              <label class="field"><span>Username</span><div class="input-box"><i class="fas fa-user left-icon"></i><input type="text" name="auth_username" placeholder="Enter username"></div></label>
              <label class="field"><span>Password</span><div class="input-box"><i class="fas fa-lock left-icon"></i><input type="password" name="auth_password" placeholder="Enter password"></div></label>
              <label class="field full-row"><span>Credential Type</span>
                <div class="pill-group">
                  <label class="pill"><input type="radio" name="auth_type" value="ssh" checked><span>SSH (Linux)</span></label>
                  <label class="pill"><input type="radio" name="auth_type" value="winrm"><span>Windows (WinRM)</span></label>
                </div>
              </label>
              <label class="field" id="auth-port-field" style="display:none"><span id="auth-port-label">Port</span><div class="input-box"><i class="fas fa-plug left-icon"></i><input type="number" name="auth_port" id="auth-port-input" placeholder="22"></div></label>
              <label class="field full-row" id="ssh-key-field" style="display:none"><span>SSH Private Key</span><div class="input-box"><i class="fas fa-key left-icon"></i><textarea name="auth_ssh_key" rows="3" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"></textarea></div></label>
            </div>
          </div>

          <!-- Description panel (dynamic) -->
          <div id="desc-panel" class="section-card full-row desc-panel">
            <div class="section-title"><i class="fas fa-info-circle"></i> <span id="desc-title">What this scan does</span></div>
            <div class="desc-list" id="desc-list"></div>
            <div class="desc-tip" id="desc-tip"></div>
          </div>

          <!-- Start button -->
          <button type="submit" class="scan-btn"><i class="fas fa-microchip"></i> Start Adaptive Security Scan</button>
        </div>
      </form>
    </section>
  </div>
</div>

<script>
// ── Auth toggle ──
const toggle      = document.getElementById("auth-toggle");
const hiddenInput = document.getElementById("scan-mode-hidden");
const credInner   = document.getElementById("cred-fields-inner");
const portField   = document.getElementById("auth-port-field");
const portInput   = document.getElementById("auth-port-input");
const portLabel   = document.getElementById("auth-port-label");
const sshKeyField = document.getElementById("ssh-key-field");
const AUTH_PORTS  = { ssh: "22", winrm: "5985" };
const PORT_LABELS = { ssh: "SSH Port", winrm: "WinRM Port" };
const allInputs = credInner.querySelectorAll("input, select, textarea");

function getAuthType() {
  const c = document.querySelector('input[name="auth_type"]:checked');
  return c ? c.value : "ssh";
}
function applyAuthType() {
  const t = getAuthType(), e = toggle.checked;
  portField.style.display= "";
  sshKeyField.style.display = t==="ssh" ? "" : "none";
  if (portLabel) portLabel.textContent = PORT_LABELS[t]||"Port";
  if (portInput && (!portInput.value||Object.values(AUTH_PORTS).includes(portInput.value))) {
    portInput.value=""; portInput.placeholder=AUTH_PORTS[t]||"";
  }
  allInputs.forEach(el => { el.disabled=!e; el.style.opacity=e?"1":"0.5"; });
}
toggle.addEventListener("change", () => {
  hiddenInput.value = toggle.checked ? "authenticated" : "unauthenticated";
  applyAuthType();
});
document.querySelectorAll('input[name="auth_type"]').forEach(r => r.addEventListener("change", applyAuthType));
toggle.dispatchEvent(new Event("change"));

// ── Dynamic scan type ──
const scanType = document.getElementById("scan-type");
const secEngine = document.getElementById("sec-engine");
const secCreds = document.getElementById("sec-creds");
const descList = document.getElementById("desc-list");
const descTip = document.getElementById("desc-tip");
const descTitle = document.getElementById("desc-title");
const scopeRow = document.getElementById("scope-row");

// ── Scope toggle ──
const scopeInputs = document.querySelectorAll('input[name="scan_scope"]');
const targetInput = document.getElementById("target-input");
const targetHelper = document.getElementById("target-helper");

const HOST_PLACEHOLDER = "IP, Domain or URL";
const HOST_HELPER = "e.g. 192.168.1.10 or scanme.nmap.org";
const NET_PLACEHOLDER = "Subnet (CIDR)";
const NET_HELPER = "e.g. 192.168.1.0/24 or 10.0.0.0/16";

scopeInputs.forEach(r => r.addEventListener("change", () => {
  const isNet = document.querySelector('input[name="scan_scope"]:checked')?.value === "network";
  targetInput.placeholder = isNet ? NET_PLACEHOLDER : HOST_PLACEHOLDER;
  targetHelper.innerHTML = isNet ? NET_HELPER : HOST_HELPER;
  if (scanType.value === "security") updateScanUI();
}));

const DESCS = {
  security: {
    title: "Adaptive Security Scan — intelligent vulnerability assessment",
    items: ["Smart Scan adapts depth based on target size and risk","Discovers open ports and services with banner grabbing","Advanced service fingerprinting (Apache, Nginx, MySQL, etc.)","Web technology detection (WordPress, Laravel, React, etc.)","Comprehensive SSL/TLS security analysis","HTTP security hardening checks (CSP, HSTS, X-Frame-Options)","OS fingerprinting from banners and TTL signatures","Detects CVEs via NVD database with EPSS scoring","Generates risk score, AI analysis and remediation report","Host Scan: single target deep analysis","Network Scan: CIDR subnet, adaptive host ranking"],
    tip: "<i class='fas fa-lightbulb'></i> <strong>Tip:</strong> The scanner automatically adjusts scan depth for optimal speed vs. thoroughness."
  },
  web: {
    title: "Web Security Scan — deep website analysis",
    items: ["Analyzes HTTP security headers (CSP, HSTS, XFO, XCTO)","Checks cookie security (Secure, HttpOnly, SameSite)","Detects web technologies and frameworks","Scans for sensitive files and exposed admin panels","Analyzes JavaScript for hardcoded secrets and tokens","Tests CORS, HTTP methods, SSL/TLS configuration","Detects XSS and SQL injection indicators","Validates TLS certificates (expiry, self-signed, weak ciphers)","Generates web risk score and AI report"],
    tip: "<i class='fas fa-lightbulb'></i> <strong>Tip:</strong> Web scans are non-invasive and require no credentials."
  },
};

function updateScanUI() {
  const t = scanType.value;
  const scope = document.querySelector('input[name="scan_scope"]:checked')?.value || "host";
  const isSec = t === "security";
  const isNet = isSec && scope === "network";
  secEngine.style.display = isSec ? "" : "none";
  scopeRow.style.display = isSec ? "" : "none";
  secCreds.style.display = isSec && !isNet ? "" : "none";

  const d = DESCS[t];
  descTitle.textContent = d.title;
  descList.innerHTML = d.items.map(s => '<div class="desc-item"><i class="fas fa-check-circle"></i> '+s+'</div>').join("");
  descTip.innerHTML = d.tip;
}
scanType.addEventListener("change", updateScanUI);
updateScanUI();
</script>

{% endblock %}
